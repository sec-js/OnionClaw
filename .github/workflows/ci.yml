name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ── syntax check (fast, no deps) ─────────────────────────────────
  syntax:
    name: Syntax check (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Syntax check — all scripts
        run: |
          for f in _bootstrap.py sicry.py ask.py check_engines.py check_tor.py fetch.py pipeline.py renew.py search.py sync_sicry.py; do
            python3 -m py_compile "$f" && echo "$f OK"
          done

  # ── lint (ruff) ───────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff~=0.8.0

      - name: Run ruff lint
        run: ruff check _bootstrap.py tests/

      - name: Run ruff format check
        run: ruff format --check _bootstrap.py tests/

  # ── type check (mypy) on _bootstrap.py ───────────────────────────
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install mypy
        run: pip install mypy~=1.13.0

      - name: Run mypy
        run: mypy _bootstrap.py --ignore-missing-imports

  # ── tests (pytest) ────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install requests[socks] beautifulsoup4 python-dotenv pytest pytest-cov

      - name: Import check — sicry
        run: python3 -c "import sicry; print('sicry', sicry.__version__, 'imported OK')"

      - name: Run tests with coverage
        run: pytest tests/ --cov=_bootstrap --cov-report=term-missing

  # ── sicry.py sync drift check ─────────────────────────────────────
  sicry-sync:
    name: Check bundled sicry.py version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requests
        run: pip install requests

      - name: Check bundled sicry.py vs upstream
        # Exit code 2 means bundled is behind upstream; treated as a warning
        # (|| true) so CI stays green — maintainer sees the notice in logs.
        run: python3 sync_sicry.py --check-bundled || true
